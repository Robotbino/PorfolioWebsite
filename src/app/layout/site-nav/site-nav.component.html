<header class="navigation-bar">
  <nav class="navigation-content" aria-label="Main navigation">
    <a class="logo" href="#dest-home" (click)="scrollToSection('dest-home', $event)"><i
        class="fa-regular fa-house"></i></a>
    <ul class="nav-items" role="list">
      <li>
        <a href="#dest-work" (click)="scrollToSection('dest-work', $event)" class="nav-link">Work</a>
      </li>
      <li>
        <a href="#dest-about" (click)="scrollToSection('dest-about', $event)" class="nav-link">About</a>
      </li>
      <li>
        <a href="#dest-contact" (click)="scrollToSection('dest-contact', $event)" class="nav-link">Contact</a>
      </li>
    </ul>
    <div class="nav-actions">
      <button class="menu-trigger" [class.open]="menuOpen"
              (click)="toggleMenu()"
              [attr.aria-expanded]="menuOpen"
              aria-controls="mobile-nav"
              aria-label="Menu">
        <span class="menu-bar"></span>
        <span class="menu-bar"></span>
        <span class="menu-bar"></span>
      </button>
      <button class="theme-toggle" (click)="theme.toggle()"
        [attr.aria-label]="theme.isDark() ? 'Switch to light mode' : 'Switch to dark mode'">
        <svg class="dark-icon" *ngIf="theme.isDark()" width="24" height="24" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"></circle>
          <line x1="12" y1="1" x2="12" y2="3"></line>
          <line x1="12" y1="21" x2="12" y2="23"></line>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
          <line x1="1" y1="12" x2="3" y2="12"></line>
          <line x1="21" y1="12" x2="23" y2="12"></line>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>
        <svg class="light-icon" *ngIf="!theme.isDark()" width="24" height="24" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
      </button>
    </div>
  </nav>
</header>

<div class="mobile-overlay" id="mobile-nav"
     [class.open]="menuOpen"
     [attr.aria-hidden]="!menuOpen"
     (click)="closeMenu()">
  <nav class="mobile-nav" aria-label="Mobile navigation" (click)="$event.stopPropagation()">
    <a href="#dest-home" (click)="scrollToSection('dest-home', $event); closeMenu()" class="mobile-link">Home</a>
    <a href="#dest-work" (click)="scrollToSection('dest-work', $event); closeMenu()" class="mobile-link">Work</a>
    <a href="#dest-about" (click)="scrollToSection('dest-about', $event); closeMenu()" class="mobile-link">About</a>
    <a href="#dest-contact" (click)="scrollToSection('dest-contact', $event); closeMenu()" class="mobile-link">Contact</a>
  </nav>
</div>
