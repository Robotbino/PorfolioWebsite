<header class="navigation-bar" [class.scrolled]="isScrolled">
  <nav class="navigation-content" aria-label="Main navigation">
    <a class="logo" routerLink="/">My Portfolio</a>
    <ul class="nav-items" role="list">
      <li>
        <a routerLink="/work" routerLinkActive="active" class="nav-link">Work</a>
      </li>
      <li>
        <a routerLink="/about" routerLinkActive="active" class="nav-link">About</a>
      </li>
      <li>
        <a routerLink="/contact" routerLinkActive="active" class="nav-link">Contact</a>
      </li>
    </ul>
    <button class="theme-toggle" (click)="theme.toggle()"
      [attr.aria-label]="theme.isDark() ? 'Switch to light mode' : 'Switch to dark mode'">
      <!-- Sun icon - shown in dark mode, switches to light mode -->
      <svg class="dark-icon" *ngIf="theme.isDark()" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="5"></circle>
        <line x1="12" y1="1" x2="12" y2="3"></line>
        <line x1="12" y1="21" x2="12" y2="23"></line>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
        <line x1="1" y1="12" x2="3" y2="12"></line>
        <line x1="21" y1="12" x2="23" y2="12"></line>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
      </svg>
      <!-- Moon icon - shown in light mode, switches to dark mode -->
      <svg class="light-icon" *ngIf="!theme.isDark()" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
      </svg>
    </button>
  </nav>
</header>
