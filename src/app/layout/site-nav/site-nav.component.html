<header class="navigation-bar">
  <nav class="navigation-content" aria-label="Main navigation">
    <a class="logo" href="#dest-home" (click)="scrollToSection('dest-home', $event)"
       aria-label="Bino Hlongwana — home">Bino<span class="logo-dot" aria-hidden="true">.</span></a>
    <ul class="nav-items" role="list">
      <li>
        <a href="#dest-work" (click)="scrollToSection('dest-work', $event)" class="nav-link">Experience</a>
      </li>
      <li>
        <a href="#projects" (click)="scrollToSection('projects', $event)" class="nav-link">Projects</a>
      </li>
      <li>
        <a href="#dest-about" (click)="scrollToSection('dest-about', $event)" class="nav-link">About</a>
      </li>
      <li>
        <a href="#dest-certifications" (click)="scrollToSection('dest-certifications', $event)" class="nav-link">Certifications</a>
      </li>
      <li>
        <a href="#dest-contact" (click)="scrollToSection('dest-contact', $event)" class="nav-link">Contact</a>
      </li>
    </ul>
    <div class="nav-actions">
      <button class="menu-trigger" #menuTrigger [class.open]="menuOpen"
              (click)="toggleMenu()"
              [attr.aria-expanded]="menuOpen"
              aria-controls="mobile-nav"
              [attr.aria-label]="menuOpen ? 'Close menu' : 'Open menu'">
        <span class="menu-bar"></span>
        <span class="menu-bar"></span>
        <span class="menu-bar"></span>
      </button>
      <app-theme-toggle></app-theme-toggle>
    </div>
  </nav>
</header>

<div class="mobile-overlay" id="mobile-nav"
     [class.open]="menuOpen"
     [attr.aria-hidden]="!menuOpen"
     (click)="closeMenu()">
  <nav class="mobile-nav" aria-label="Mobile navigation" (click)="$event.stopPropagation()">
    <a href="#dest-home" (click)="scrollToSection('dest-home', $event); closeMenu()" class="mobile-link">Home</a>
    <a href="#dest-work" (click)="scrollToSection('dest-work', $event); closeMenu()" class="mobile-link">Experience</a>
    <a href="#projects" (click)="scrollToSection('projects', $event); closeMenu()" class="mobile-link">Projects</a>
    <a href="#dest-about" (click)="scrollToSection('dest-about', $event); closeMenu()" class="mobile-link">About</a>
    <a href="#dest-certifications" (click)="scrollToSection('dest-certifications', $event); closeMenu()" class="mobile-link">Certifications</a>
    <a href="#dest-contact" (click)="scrollToSection('dest-contact', $event); closeMenu()" class="mobile-link">Contact</a>
  </nav>
</div>
