<section class="section" aria-labelledby="experience-title">
  <div class="container">
    <app-display-heading pre="Explore My" title="Experience" titleId="experience-title"></app-display-heading>

    <div class="experience-grid">
      <article class="experience-card">
        <h3 class="experience-card-title">Technologies</h3>
        <div class="skills-grid">
          <div class="skill-group" *ngFor="let group of experienceGroups">
            <div class="skill-header">
              <span class="checkmark" aria-hidden="true">✔</span>
              <h4 class="skill-title">{{ group.label }}</h4>
            </div>
            <p class="skill-list">{{ group.description }}</p>
          </div>
        </div>
      </article>


      <article class="experience-card">
        <h3 class="experience-card-title">Non-Technical Skills</h3>
        <div class="skills-grid">
          <div class="skill-group">
            <div class="skill-header">
              <span class="checkmark" aria-hidden="true">✔</span>
              <h4 class="skill-title">Communication and Collaboration</h4>
            </div>
          </div>

          <div class="skill-group">
            <div class="skill-header">
              <span class="checkmark" aria-hidden="true">✔</span>
              <h4 class="skill-title">Analytical Thinker</h4>
            </div>
          </div>

          <div class="skill-group">
            <div class="skill-header">
              <span class="checkmark" aria-hidden="true">✔</span>
              <h4 class="skill-title">Continuous Learning</h4>
            </div>
          </div>

          <div class="skill-group">
            <div class="skill-header">
              <span class="checkmark" aria-hidden="true">✔</span>
              <h4 class="skill-title">Deadline and Results-Driven</h4>
            </div>
          </div>
        </div>
      </article>
    </div>
  </div>
</section>


<section class="section" aria-labelledby="projects-title">
  <div class="container">
    <app-display-heading pre="Browse My Recent" title="Projects" titleId="projects-title"></app-display-heading>

    <!-- Horizontal showcase. #projectsViewport supplies the scroll distance, the
         sticky #projectsStage frames the cards, and WorkComponent translates
         #projectsTrack on scroll. Without the host's .showcase-on class (no-JS,
         reduced motion, or narrow screens) these are plain blocks and the cards
         fall back to the vertical stack. -->
    <div class="projects-viewport" #projectsViewport>
      <div class="projects-stage" #projectsStage>
        <div class="projects-container" #projectsTrack>

      <article class="project-card" *ngFor="let project of projects">
        <div class="project-content">
          <div class="project-text">
            <h3 class="project-title">{{ project.title }}</h3>
            <p class="project-description">{{ project.description }}</p>
            <div class="project-tech" role="list" aria-label="Technologies used">
              <span class="tech-tag" *ngFor="let t of project.tech">{{ t }}</span>
            </div>
            <div class="project-links">
              <a [href]="project.href" class="btn btn-secondary" target="_blank"
                rel="noopener noreferrer">
                GitHub
              </a>
            </div>
          </div>
          <div class="project-image">
            <img
              [src]="projectImg(project)"
              [alt]="projectAlt(project)"
              loading="lazy"
            >
          </div>
        </div>
      </article>
        </div>
      </div>
    </div>
  </div>
</section>
