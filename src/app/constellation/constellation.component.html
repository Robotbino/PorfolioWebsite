<!-- A single fixed skeleton (8 stars / 7 links). The Travel service + rAF morph
     it between destinations on navigation; element positions are set imperatively
     (see renderAt), so each star group sits at the SVG origin and is translated. -->
<div class="cluster">
  <svg
    class="constellation"
    viewBox="0 0 300 300"
    preserveAspectRatio="xMidYMid meet"
    aria-hidden="true"
    focusable="false"
  >
    <g class="links">
      <line
        *ngFor="let l of topology; let i = index"
        #lineEl
        [style.animation-delay]="0.3 + i * 0.1 + 's'"
      />
    </g>

    <g class="nodes">
      <g
        class="star"
        *ngFor="let i of starIndices"
        #starEl
        [style.--i]="i"
        [style.animation-delay]="i * 0.07 + 's'"
      >
        <circle class="halo" [attr.r]="radii[i] * 4" />
        <circle class="core" [attr.r]="radii[i]" />
      </g>
    </g>
  </svg>
</div>
