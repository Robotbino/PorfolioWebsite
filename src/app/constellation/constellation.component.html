<!-- The active destination's constellation. Switches on navigation; the morph
     between destinations arrives in a later commit. -->
<div class="cluster">
  <svg
    class="constellation"
    [attr.viewBox]="current().viewBox"
    preserveAspectRatio="xMidYMid meet"
    aria-hidden="true"
    focusable="false"
  >
    <g class="links">
      <line
        *ngFor="let l of current().links; let i = index"
        #lineEl
        [attr.x1]="current().stars[l.a].x"
        [attr.y1]="current().stars[l.a].y"
        [attr.x2]="current().stars[l.b].x"
        [attr.y2]="current().stars[l.b].y"
        [style.animation-delay]="0.3 + i * 0.1 + 's'"
      />
    </g>

    <g class="nodes">
      <g
        class="star"
        *ngFor="let s of current().stars; let i = index"
        #starEl
        [style.--i]="i"
        [style.animation-delay]="i * 0.07 + 's'"
      >
        <circle class="halo" [attr.cx]="s.x" [attr.cy]="s.y" [attr.r]="s.r * 4" />
        <circle class="core" [attr.cx]="s.x" [attr.cy]="s.y" [attr.r]="s.r" />
      </g>
    </g>
  </svg>
</div>
